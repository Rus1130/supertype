<script type="module">
    import { SuperType } from "./index.js";

    const tw = new SuperType(document.body, {
        "end": function() {
            const returnButton = document.createElement("div");
            returnButton.classList.add("button");
            returnButton.id = "return";
            returnButton.textContent = "▌< Return";
            returnButton.onclick = () => {
                location.href = 'https://rus1130.github.io/space2313/';
            };
            tw.appendToTarget(returnButton);
            tw.target.style.overflowY = 'scroll';
            tw.target.classList.add('hide-scrollbar');
        }
    })

    await tw.load("example2.st").then(() => {
        tw.start();
    })

    let speedOverride = false;

    document.body.addEventListener("keydown", (e) => {
        if(e.key === " ") {
            tw.paused() ? tw.resume() : tw.pause();
        }

        if(e.key === "i"){
            tw.header.instant = !tw.header.instant;
        }

        if(e.key === "ArrowRight") {
            speedOverride = !speedOverride;
            tw.state.userSpeedOverride = speedOverride ? 5 : null;
        }

        if(e.key === "r"){
            tw.target.innerHTML = "";
            tw.state.glitches = [];
            tw.start(tw.state.page)
        }
    });

</script>
